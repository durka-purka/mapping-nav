# EKF Filter Configuration for Gazebo Simulation
# Fuses dummy odometry + IMU

ekf_filter_node:
  ros__parameters:
    use_sim_time: true
    frequency: 50.0
    sensor_timeout: 0.1
    two_d_mode: true
    
    # Frames
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: map
    
    # Inputs
    odom0: odometry/filtered_dummy
    odom0_config: [true,  true,  false,
                   false, false, true,
                   true,  true,  false,
                   false, false, true,
                   false]
    odom0_queue_size: 10
    odom0_relative: false
    odom0_relative_pose_mixing_rule: average
    
    imu0: /imu/data_raw
    imu0_config: [false, false, false,
                  true,  true,  true,
                  false, false, false,
                  true,  true,  true,
                  true]
    imu0_queue_size: 10
    imu0_relative: true
    imu0_differential: false
    
